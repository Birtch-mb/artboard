services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: artboard
      POSTGRES_PASSWORD: artboard_dev
      POSTGRES_DB: artboard
    ports:
      - "5450:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artboard -d artboard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: artboard_minio
      MINIO_ROOT_PASSWORD: artboard_minio_dev
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
